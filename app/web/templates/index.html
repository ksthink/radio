<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎵 PiRadio</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📻</text></svg>">
</head>
<body>
    <div id="app">
        <!-- 헤더 -->
        <header class="header">
            <h1>📻 PiRadio</h1>
            <button class="header-btn" id="btn-login-header" title="YouTube 로그인">🔐</button>
        </header>

        <!-- 탭 네비게이션 -->
        <nav class="tabs">
            <button class="tab active" data-tab="player">재생</button>
            <button class="tab" data-tab="channels">채널</button>
        </nav>

        <!-- 재생 탭 -->
        <section id="tab-player" class="tab-content active">
            <div class="now-playing">
                <div class="album-art" id="album-art">
                    <span class="music-icon">♫</span>
                </div>
                <div class="track-info">
                    <div class="track-title" id="track-title">재생 대기 중</div>
                    <div class="track-artist" id="track-artist"></div>
                    <div class="channel-name" id="channel-name"></div>
                </div>
                <div class="progress-container">
                    <span id="elapsed">0:00</span>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="btn-prev" title="이전">⏮</button>
                <button class="ctrl-btn ctrl-btn-main" id="btn-play" title="재생/일시정지">▶</button>
                <button class="ctrl-btn" id="btn-next" title="다음">⏭</button>
                <button class="ctrl-btn" id="btn-stop" title="정지">⏹</button>
            </div>

            <div class="volume-control">
                <button class="vol-btn" id="btn-vol-down">🔉</button>
                <input type="range" id="volume-slider" min="0" max="100" value="50" class="volume-slider">
                <button class="vol-btn" id="btn-vol-up">🔊</button>
                <span id="volume-value" class="volume-value">50%</span>
            </div>

            <div class="sleep-timer">
                <label>슬립 타이머:</label>
                <select id="sleep-select">
                    <option value="0">끄기</option>
                    <option value="15">15분</option>
                    <option value="30">30분</option>
                    <option value="60">1시간</option>
                    <option value="120">2시간</option>
                </select>
                <span id="sleep-remaining"></span>
            </div>

            <div class="url-input-section">
                <input type="text" id="playlist-url" placeholder="YouTube 플레이리스트 또는 곡 URL" class="playlist-url-input">
                <button id="btn-play-url" class="btn-play-url">🎵 재생</button>
            </div>
        </section>

        <!-- 채널 탭 -->
        <section id="tab-channels" class="tab-content">
            <div class="channel-list" id="channel-list"></div>
            <div class="channel-add">
                <h3>채널 추가</h3>
                <input type="text" id="add-name" placeholder="채널 이름">
                <input type="text" id="add-id" placeholder="YouTube Music 재생목록 ID">
                <select id="add-type">
                    <option value="playlist">재생목록</option>
                    <option value="radio">라디오</option>
                </select>
                <button class="btn-add" id="btn-add-channel">추가</button>
            </div>
        </section>
    </div>

    <!-- 로그인 모달 -->
    <div id="login-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>YouTube 로그인</h2>
                <button class="modal-close" id="btn-close-login">&times;</button>
            </div>
            <div class="modal-body">
                <p>로컬 PC에서 <code>python3 get_youtube_headers.py</code> 실행 후 JSON을 붙여넣으세요.</p>
                <textarea id="login-headers" class="login-headers-input" placeholder='{"Authorization": "SAPISIDHASH ...", "User-Agent": "Mozilla/5.0 ..."}' rows="5"></textarea>
                <button class="btn-primary" id="btn-do-login" style="width:100%; margin-top:10px;">로그인</button>
                <div id="login-status" class="login-status"></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.4/socket.io.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
