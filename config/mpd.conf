# MPD 설정 - PiRadio용
# 설치: sudo cp config/mpd.conf /etc/mpd.conf

music_directory     "/var/lib/mpd/music"
playlist_directory  "/var/lib/mpd/playlists"
db_file             "/var/lib/mpd/tag_cache"
log_file            "/var/log/mpd/mpd.log"
pid_file            "/run/mpd/pid"
state_file          "/var/lib/mpd/state"
sticker_file        "/var/lib/mpd/sticker.sql"

# 네트워크 바인딩
bind_to_address     "any"
port                "6600"

# ALSA 오디오 출력 (HiFiBerry DAC)
audio_output {
    type            "alsa"
    name            "Pirate Audio Speaker"
    device          "hw:0,0"
    mixer_type      "software"
}

# HTTP 스트리밍 입력 (YouTube Music용)
input {
    plugin          "curl"
    proxy           ""
}

# 파일시스템 감시 비활성 (성능)
auto_update         "no"

# 리플레이 게인
replaygain          "auto"

# 버퍼 설정 (Pi Zero 2 W 최적화)
audio_buffer_size   "4096"
buffer_before_play  "20%"

# 로그 레벨
log_level           "default"
