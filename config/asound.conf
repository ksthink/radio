# ALSA 설정 - HiFiBerry DAC (Pirate Audio Speaker)
# 설치: sudo cp config/asound.conf /etc/asound.conf

pcm.hifiberry {
    type hw
    card 0
    device 0
}

pcm.!default {
    type plug
    slave.pcm "softvol"
}

pcm.softvol {
    type softvol
    slave {
        pcm "hifiberry"
    }
    control {
        name "SoftMaster"
        card 0
    }
    min_dB -51.0
    max_dB 0.0
}

ctl.!default {
    type hw
    card 0
}
